<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsere Zeit 🖤</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI',sans-serif;
background:black;
color:white;
overflow:hidden;
}

/* intro screen */

#intro{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:black;

display:flex;

justify-content:center;
align-items:center;

font-size:32px;

z-index:10;

}

.cursor{
border-right:3px solid white;
padding-right:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{border-color:white}
25%,75%{border-color:transparent}
}

/* main app */

#app{
opacity:0;
transition:1s;
}

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.container{
background:rgba(255,0,60,0.08);
border:1px solid rgba(255,0,80,0.3);
backdrop-filter:blur(20px);
padding:40px;
border-radius:25px;
box-shadow:
0 0 40px rgba(255,0,80,0.25),
inset 0 0 25px rgba(255,0,80,0.15);
text-align:center;
max-width:420px;
margin:auto;
margin-top:25vh;
z-index:2;
position:relative;
}

h1{
font-size:28px;
margin-bottom:10px;
}

.date{
opacity:0.8;
margin-bottom:20px;
}

.counter{
font-size:22px;
line-height:1.6;
}

.heart{
font-size:70px;
margin-bottom:15px;
animation:beat 1.4s infinite;
cursor:pointer;
}

@keyframes beat{
0%{transform:scale(1)}
30%{transform:scale(1.15)}
50%{transform:scale(1)}
70%{transform:scale(1.15)}
100%{transform:scale(1)}
}

.footer{
margin-top:25px;
font-size:14px;
opacity:0.6;
}

/* floating hearts */

.heart-bg{
position:absolute;
color:#ff2e63;
opacity:0.15;
animation:floatUp linear infinite;
}

@keyframes floatUp{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* confetti */

.confetti{
position:absolute;
width:8px;
height:8px;
opacity:0.9;
animation:confettiFall linear forwards;
}

@keyframes confettiFall{
from{transform:translateY(-10vh) rotate(0deg)}
to{transform:translateY(110vh) rotate(720deg)}
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.4s;
z-index:5;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal-box{
background:#120005;
padding:35px;
border-radius:20px;
max-width:320px;
text-align:center;
box-shadow:0 0 40px rgba(255,0,80,0.4);
}

.modal-box button{
margin-top:20px;
padding:10px 18px;
border:none;
border-radius:10px;
background:#ff2e63;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="intro">
<span id="introText" class="cursor"></span>
</div>

<div id="app">

<canvas id="stars"></canvas>

<div class="container">

<div class="heart" onclick="openMessage()">❤️</div>

<h1>Wir kennen uns schon seit</h1>

<div class="date" id="date"></div>

<div class="counter" id="counter"></div>

<div class="footer">
für immer & ewig 🖤
</div>

</div>

</div>

<div class="modal" id="loveModal">

<div class="modal-box">

<h2>💌 Für dich</h2>

<p>
Danke für jeden Moment mit dir.  
Seit dem 12.03.2021 ist mein Leben so viel schöner geworden.  
Ich freue mich auf alles, was noch vor uns liegt ❤️
</p>

<button onclick="closeMessage()">Schließen</button>

</div>

</div>

<script>

/* typing intro */

const text="Hey Cassy ❤️";

let i=0;

function type(){

if(i<text.length){

document.getElementById("introText").innerHTML+=text.charAt(i);

i++;

setTimeout(type,90);

}else{

setTimeout(()=>{

document.getElementById("intro").style.display="none";

document.getElementById("app").style.opacity=1;

},900);

}

}

type();

/* start date */

const startDate = new Date("2021-03-12T00:00:00");

document.getElementById("date").innerText =
startDate.toLocaleDateString("de-DE");

/* counter */

function updateCounter(){

const now=new Date();
const diff=now-startDate;

const seconds=Math.floor(diff/1000)%60;
const minutes=Math.floor(diff/(1000*60))%60;
const hours=Math.floor(diff/(1000*60*60))%24;
const days=Math.floor(diff/(1000*60*60*24));

document.getElementById("counter").innerHTML=

days+" Tage<br>"+
hours+" Stunden<br>"+
minutes+" Minuten<br>"+
seconds+" Sekunden";

}

setInterval(updateCounter,1000);
updateCounter();

/* floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.className="heart-bg";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(6+Math.random()*6)+"s";

heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),12000);

}

setInterval(createHeart,900);

/* anniversary confetti */

function anniversaryConfetti(){

const today=new Date();

if(today.getDate()===12 && today.getMonth()===2){

for(let i=0;i<120;i++){

const confetti=document.createElement("div");

confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";

confetti.style.background=`hsl(${Math.random()*360},70%,60%)`;

confetti.style.animationDuration=(3+Math.random()*4)+"s";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),7000);

}

}

}

anniversaryConfetti();

/* modal */

function openMessage(){

document.getElementById("loveModal").classList.add("active");

}

function closeMessage(){

document.getElementById("loveModal").classList.remove("active");

}

/* stars */

const canvas=document.getElementById("stars");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<150;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

size:Math.random()*2

});

}

let offsetX=0;

let offsetY=0;

window.addEventListener("mousemove",(e)=>{

offsetX=(e.clientX-window.innerWidth/2)*0.02;

offsetY=(e.clientY-window.innerHeight/2)*0.02;

});

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(star=>{

ctx.beginPath();

ctx.arc(

star.x+offsetX,

star.y+offsetY,

star.size,

0,

Math.PI*2

);

ctx.fill();

});

requestAnimationFrame(drawStars);

}

drawStars();

</script>

</body>
</html>
